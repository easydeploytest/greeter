{{- if .Values.infisicalHost }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: infisical-{{ .Values.name }}
  namespace: {{ .Values.name }}-{{ .Values.env }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          # ESO v2: SecretKeySelector directly (no secretRef wrapper)
          clientId:
            name: {{ .Values.name }}-infisical-auth
            key: clientId
          clientSecret:
            name: {{ .Values.name }}-infisical-auth
            key: clientSecret
      secretsScope:
        projectSlug: {{ .Values.name }}
        environmentSlug: {{ .Values.env }}
        recursive: true
      hostAPI: {{ .Values.infisicalHost }}/api
{{- end }}
