# Required fields (set per-app via devspace or ArgoCD)
name: ""
team: ""
env: dev
port: 3000

# Full image reference — set by devspace or generator (DevSpace rewrites this whole field)
image: ""
imagePullPolicy: Always

clusterIP: "135.181.177.246"
infisicalHost: "http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080"
# Infisical machine identity credentials — injected from a K8s secret named
# `{name}-infisical-auth` with keys `clientId` and `clientSecret`

health:
  startup_delay: 2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

scaling:
  min: 1
  max: 3
  cpu_target: 80

auth:
  require_auth: false   # Platform-level auth not yet wired; flip to true when DX Gateway is added
  attributes: []

dependencies: []
